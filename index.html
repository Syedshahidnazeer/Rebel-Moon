<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <meta name="description"
    content="Tales of the Marble Moon - Draw celestial cards inspired by the Taj Mahal and Mughal legends. Collect mythical scenes and build your bestiary." />
  <title>Tales of the Marble Moon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script id="app-entry" type="module" src="/main.tsx"></script>
  <script>
    const entryScript = document.getElementById("app-entry");
    if (
      window.location.hostname.endsWith("github.io") &&
      !window.location.pathname.includes("/dist/") &&
      entryScript?.getAttribute("src") === "/main.tsx"
    ) {
      window.location.replace(new URL("./dist/", window.location.href).toString());
    }
  </script>
</body>

</html>
